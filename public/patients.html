<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients - Guardian Net</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-shield-alt"></i>
                <span>Guardian Net</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/patients.html" class="active">
                    <i class="fas fa-users"></i>
                    <span>Patients</span>
                </a>
                <a href="/monitor.html">
                    <i class="fas fa-video"></i>
                    <span>Live Monitor</span>
                </a>
                <a href="#" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <div>
                        <p id="userName">Loading...</p>
                        <small>Caretaker</small>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1>Patients Management</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="openAddPatientModal()">
                        <i class="fas fa-plus"></i>
                        Add New Patient
                    </button>
                </div>
            </header>

            <!-- Patients List -->
            <div class="card">
                <div class="card-header">
                    <h2>All Patients</h2>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchPatient" placeholder="Search patients...">
                    </div>
                </div>
                <div class="card-body">
                    <table class="data-table" id="patientsTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Age</th>
                                <th>Gender</th>
                                <th>Emergency Contact</th>
                                <th>Phone</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="patientsList">
                            <tr>
                                <td colspan="6" class="text-center">Loading patients...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Patient Modal -->
    <div id="patientModal" class="modal">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Patient</h2>
                <button class="close-btn" onclick="closeModal('patientModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="patientForm">
                    <input type="hidden" id="patientId">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="fullName">Full Name *</label>
                            <input type="text" id="fullName" required>
                        </div>
                        <div class="form-group">
                            <label for="age">Age</label>
                            <input type="number" id="age" min="0" max="150">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="gender">Gender</label>
                            <select id="gender">
                                <option value="">Select</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="medicalConditions">Medical Conditions</label>
                            <input type="text" id="medicalConditions" placeholder="e.g., Diabetes, Hypertension">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="emergencyName">Emergency Contact Name *</label>
                            <input type="text" id="emergencyName" required>
                        </div>
                        <div class="form-group">
                            <label for="emergencyPhone">Emergency Phone *</label>
                            <input type="tel" id="emergencyPhone" placeholder="+1234567890" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="emergencyRelation">Relation</label>
                            <input type="text" id="emergencyRelation" placeholder="e.g., Spouse, Child">
                        </div>
                        <div class="form-group">
                            <label for="address">Address</label>
                            <input type="text" id="address" placeholder="Full address">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('patientModal')">Cancel</button>
                <button class="btn btn-primary" onclick="savePatient()">Save Patient</button>
            </div>
        </div>
    </div>

    <!-- Alert Modal -->
    <div id="alertModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Send Emergency Alert</h2>
                <button class="close-btn" onclick="closeModal('alertModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="alertForm">
                    <input type="hidden" id="alertPatientId">
                    <div class="form-group">
                        <label>Patient</label>
                        <p id="alertPatientName" class="form-text"></p>
                    </div>
                    <div class="form-group">
                        <label>Emergency Contact</label>
                        <p id="alertContactInfo" class="form-text"></p>
                    </div>
                    <div class="form-group">
                        <label for="alertMessage">Custom Message (Optional)</label>
                        <textarea id="alertMessage" rows="3" placeholder="Enter custom emergency message"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('alertModal')">Cancel</button>
                <button class="btn btn-danger" onclick="sendEmergencyAlert()">
                    <i class="fas fa-exclamation-triangle"></i>
                    Send Emergency Alert
                </button>
            </div>
        </div>
    </div>

    <script src="/js/patients.js"></script>
</body>
</html>
