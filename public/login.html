<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Guardian Net</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-shield-alt"></i>
                    <span>Guardian Net</span>
                </div>
                <h2>Welcome Back</h2>
                <p>Sign in to access your dashboard</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i>
                        Username
                    </label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i>
                    Sign In
                </button>
            </form>

            <!-- Register Form (Hidden by default) -->
            <form id="registerForm" class="auth-form" style="display: none;">
                <div class="form-group">
                    <label for="reg-fullname">
                        <i class="fas fa-user-circle"></i>
                        Full Name
                    </label>
                    <input type="text" id="reg-fullname" name="fullname" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="reg-username">
                        <i class="fas fa-user"></i>
                        Username
                    </label>
                    <input type="text" id="reg-username" name="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">
                        <i class="fas fa-envelope"></i>
                        Email
                    </label>
                    <input type="email" id="reg-email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="reg-phone">
                        <i class="fas fa-phone"></i>
                        Phone (Optional)
                    </label>
                    <input type="tel" id="reg-phone" name="phone" placeholder="Enter your phone number">
                </div>
                <div class="form-group">
                    <label for="reg-password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <input type="password" id="reg-password" name="password" placeholder="Choose a password" required>
                </div>
                <div class="form-group">
                    <label for="reg-confirm-password">
                        <i class="fas fa-lock"></i>
                        Confirm Password
                    </label>
                    <input type="password" id="reg-confirm-password" name="confirm_password" placeholder="Confirm your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-user-plus"></i>
                    Create Account
                </button>
            </form>

            <div class="auth-footer">
                <p id="authToggle">
                    Don't have an account? 
                    <a href="#" onclick="toggleAuthForms()">Register here</a>
                </p>
                <a href="/" class="back-home">
                    <i class="fas fa-arrow-left"></i>
                    Back to Home
                </a>
            </div>
        </div>
    </div>

    <script>
        function toggleAuthForms() {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const authToggle = document.getElementById('authToggle');
            
            if (loginForm.style.display !== 'none') {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                authToggle.innerHTML = `Already have an account? <a href="#" onclick="toggleAuthForms()">Sign In</a>`;
            } else {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                authToggle.innerHTML = `Don't have an account? <a href="#" onclick="toggleAuthForms()">Register here</a>`;
            }
        }

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/dashboard.html';
                } else {
                    alert(data.error || 'Login failed');
                }
            } catch (error) {
                alert('Connection error. Please try again.');
            }
        });

        // Register form submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullname = document.getElementById('reg-fullname').value;
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const phone = document.getElementById('reg-phone').value;
            const password = document.getElementById('reg-password').value;
            const confirmPassword = document.getElementById('reg-confirm-password').value;

            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username, 
                        password, 
                        full_name: fullname,
                        email,
                        phone 
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Registration successful! Please login.');
                    toggleAuthForms();
                    document.getElementById('registerForm').reset();
                } else {
                    alert(data.error || 'Registration failed');
                }
            } catch (error) {
                alert('Connection error. Please try again.');
            }
        });
    </script>
</body>
</html>
